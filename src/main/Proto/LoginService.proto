syntax = "proto3";

option java_multiple_files = true;
option java_package = "generated.grpc.loginService";
option java_outer_classname = "LoginServiceProto";

package loginService;

// The service definition 
// Unary type
// send id and password; return confirmation
service LoginService{
    // to confirm an account, returns an confirmation
    rpc LoginSystem(LoginRequest) returns (LoginResponse);

    rpc LogoutSystem(LogoutRequest) returns (LogoutResponse);
}

// set message of request and response
message LoginRequest{
    string id =1;
    string password =2;
}

message LoginResponse{
    Confirmation confirmation = 1;

}

message Confirmation{
    bool result =1;
    string message =2;
}


message LogoutRequest{
}
message LogoutResponse{
    Confirmation confirmation = 1;
}
